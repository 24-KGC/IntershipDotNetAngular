<div class="min-h-screen w-[full] bg-dark">
    <div class="flex flex-col gap-6 px-10 pt-5 lg:flex-row lg:items-start lg:justify-between">
        <div class="text-[clamp(0.875rem,1.25vw,1.5rem)] text-muted flex w-full flex-col gap-4 lg:w-[30%]">
            <div class="flex flex-row gap-1">
                <p> {{ time$ | async | date: 'HH:mm:ss' }}, </p>
                <p> {{ time$ | async | date: 'EEEE, MMMM d, y' }}. </p>
            </div>
            <div class="flex flex-col">
                <p> {{remainingTasksCount}} tasks remaining. </p>
                <p> Estimated time till completion: {{ Math.floor(totalEstimatedMinutes / 60) | number:'1.0-0' }} hours, {{ (totalEstimatedMinutes % 60) | number:'1.0-0' }} minutes. </p>
            </div>
        </div>

        <div class="w-full lg:w-[65%]">
            <div class="flex flex-row flex-wrap gap-4">
                <button class="btn" [class.sort-active]="isSortActive('id')" type="button" (click)="sortBy('id')">
                ID <span class="sort-arrow">{{ getSortArrow('id') }}</span>
                </button>
                <button class="btn" [class.sort-active]="isSortActive('topic')" type="button" (click)="sortBy('topic')">
                Topic <span class="sort-arrow">{{ getSortArrow('topic') }}</span>
                </button>
                <button class="btn" [class.sort-active]="isSortActive('dueDate')" type="button" (click)="sortBy('dueDate')">
                DueDate <span class="sort-arrow">{{ getSortArrow('dueDate') }}</span>
                </button>
                <button class="btn" [class.sort-active]="isSortActive('priority')" type="button" (click)="sortBy('priority')">
                Priority <span class="sort-arrow">{{ getSortArrow('priority') }}</span>
                </button>
                <button class="btn" [class.sort-active]="isSortActive('estimatedMinutes')" type="button" (click)="sortBy('estimatedMinutes')">
                Estimated Minutes <span class="sort-arrow">{{ getSortArrow('estimatedMinutes') }}</span>
                </button>
                <button class="btn ml-8" type="button" (click)="toggleCollapsed()">
                {{ collapsed ? 'List' : 'Collapse' }}
                </button>
            </div>

            <div class="mt-3 w-full">
                <input
                    class="w-full border rounded px-3 py-2 text-muted bg-transparent"
                    type="search"
                    placeholder="Search by title or topic"
                    [value]="searchQuery()"
                    (input)="setSearchQuery($any($event.target).value)"
                />
            </div>
        </div>
    </div>

    <app-task-item-component [collapsed]="collapsed" [tasks]="filteredTasks()"></app-task-item-component>
</div>
